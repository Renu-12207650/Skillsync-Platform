# Full-stack compose: backend microservices + frontend container.
# Use this from the repo root with `docker-compose up -d --build`.
services:
  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    # Host port 3307 (container 3306) so it doesn't clash with a local
    # Windows MySQL service. Microservices still use mysql:3306 internally.
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Welcome@123
      MYSQL_DATABASE: skillsync_main
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      skillsync-network:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: skillsync-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      skillsync-network:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: skillsync-zipkin
    ports:
      - "9411:9411"
    environment:
      - RABBIT_ADDRESSES=rabbitmq:5672
      - RABBIT_USER=guest
      - RABBIT_PASSWORD=guest
    depends_on:
      - rabbitmq
    networks:
      skillsync-network:
        aliases:
          - zipkin

  loki:
    image: grafana/loki:latest
    container_name: skillsync-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-storage:/loki/chunks
    command: -config.file=/etc/loki/local-config.yaml
    # Run as root to avoid permission issues when creating chunk directories on
    # Windows host mounts. If you prefer a more secure approach, create a
    # writable host directory and map it instead of using the named volume.
    user: "0:0"
    networks:
      skillsync-network:
        aliases:
          - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: skillsync-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      skillsync-network:
        aliases:
          - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: skillsync-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    depends_on:
      - prometheus
      - loki
      - zipkin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      skillsync-network:
        aliases:
          - grafana

  eureka-server:
    build:
      context: ./skillsync-eureka-server
      dockerfile: Dockerfile
    container_name: skillsync-eureka-server
    ports:
      - "9761:9761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - zipkin
    networks:
      skillsync-network:
        aliases:
          - eureka-server

  config-server:
    build:
      context: ./skillsync-config-server
      dockerfile: Dockerfile
    container_name: skillsync-config-server
    ports:
      - "9888:9888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka-server
    networks:
      skillsync-network:
        aliases:
          - config-server

  auth-service:
    build:
      context: ./skillsync-auth-service
      dockerfile: Dockerfile
    container_name: skillsync-auth-service
    ports:
      - "9081:9081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DEVELOPER_EMAIL=${DEVELOPER_EMAIL:-renudhankhar8559@gmail.com}
      - MAIL_USERNAME=${MAIL_USERNAME:-renudhankhar8559@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-ipxvqbdcjzbcguif}
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-renudhankhar8559@gmail.com}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-ipxvqbdcjzbcguif}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT=5000
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT=5000
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT=5000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - auth-service

  user-service:
    build:
      context: ./skillsync-user-service
      dockerfile: Dockerfile
    container_name: skillsync-user-service
    ports:
      - "9082:9082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - user-service

  mentor-service:
    build:
      context: ./skillsync-mentor-service
      dockerfile: Dockerfile
    container_name: skillsync-mentor-service
    ports:
      - "9083:9083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_mentor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - mentor-service

  skill-service:
    build:
      context: ./skillsync-skill-service
      dockerfile: Dockerfile
    container_name: skillsync-skill-service
    ports:
      - "9084:9084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_skill_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - skill-service

  session-service:
    build:
      context: ./skillsync-session-service
      dockerfile: Dockerfile
    container_name: skillsync-session-service
    ports:
      - "9085:9085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_session_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - session-service

  notification-service:
    build:
      context: ./skillsync-notification-service
      dockerfile: Dockerfile
    container_name: skillsync-notification-service
    ports:
      - "9088:9088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Elaichi (AI bot) — works with any OpenAI-compatible API. Drop these
      # in a .env file next to docker-compose.yml. Empty key = demo mode.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.groq.com/openai/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-llama-3.3-70b-versatile}
      # Where Nikki forwards user "contact admin" tickets via SMTP.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-renudhankhar8559@gmail.com}
      # Email configuration for sending notifications
      - MAIL_USERNAME=${MAIL_USERNAME:-renudhankhar8559@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-ipxvqbdcjzbcguif}
      - SPRING_MAIL_HOST=smtp.gmail.com
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-renudhankhar8559@gmail.com}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-ipxvqbdcjzbcguif}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT=5000
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT=5000
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT=5000
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skillsync_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Welcome@123
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
    networks:
      skillsync-network:
        aliases:
          - notification-service

  api-gateway:
    build:
      context: ./skillsync-api-gateway
      dockerfile: Dockerfile
    container_name: skillsync-api-gateway
    # Map gateway to a different host port to avoid conflicts on host (::1:9080)
    ports:
      - "8888:9080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - eureka-server
      - config-server
    networks:
      skillsync-network:
        aliases:
          - api-gateway

  frontend:
    build:
      context: ./skillsync-frontend
      dockerfile: Dockerfile
    container_name: skillsync-frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      skillsync-network:
        aliases:
          - frontend

# ACCESS URLS AFTER `docker-compose up -d --build`
# Frontend:            http://localhost:8080
# API Gateway / Swagger http://localhost:9080/swagger-ui.html
# Eureka:              http://localhost:9761
# Config Server:       http://localhost:9888
# RabbitMQ Admin:      http://localhost:15672 (guest / guest)
# Grafana:             http://localhost:3000
# Zipkin:              http://localhost:9411
# Prometheus:          http://localhost:9090
# Service ports:
# - auth-service       9081
# - user-service       9082
# - mentor-service     9083
# - skill-service      9084
# - session-service    9085
# - notification-service 9088

volumes:
  mysql-data:
    driver: local
  rabbitmq-data:
    driver: local
  loki-storage:
    driver: local

networks:
  skillsync-network:
    driver: bridge
