global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'skillsync-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'host.docker.internal:9080' # API Gateway
          - 'host.docker.internal:9081' # Auth Service
          - 'host.docker.internal:9082' # User Service
          - 'host.docker.internal:9083' # Skill Service
          - 'host.docker.internal:9084' # Mentor Service
          - 'host.docker.internal:9085' # Notification Service