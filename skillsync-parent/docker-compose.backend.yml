# Backend-only compose: infrastructure + microservices, no frontend container.
# Use this file when you want the backend stack without the UI.
version: '3.8'

services:
  # DATABASE: MySQL for all SkillSync microservices
  mysql:
    image: mysql:8.0
    container_name: skillsync-mysql
    mem_limit: 1g
    environment:
      MYSQL_ROOT_PASSWORD: Welcome@123
      MYSQL_DATABASE: skillsync_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - monitor-net

  # MESSAGING: Broker for Notification Events
  rabbitmq:
    image: rabbitmq:3-management
    container_name: skillsync-rabbitmq
    ports:
      - "5672:5672"   # RabbitMQ Port
      - "15672:15672" # Management UI Port
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TRACING: Distributed tracing to see the flow between microservices
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: skillsync-zipkin
    ports:
      - "9411:9411"
    environment:
      - RABBIT_ADDRESSES=rabbitmq:5672
      - RABBIT_USER=guest
      - RABBIT_PASSWORD=guest
    depends_on:
      - rabbitmq
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9411/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # LOGS: The database for your application logs
  loki:
    image: grafana/loki:2.9.0
    container_name: skillsync-loki
    user: "0:0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-storage:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # METRICS: The engine that scrapes CPU/RAM data from your Eclipse services
  prometheus:
    image: prom/prometheus:latest
    container_name: skillsync-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # EUREKA SERVER: Service Registry and Discovery
  eureka-server:
    image: skillsync-eureka-server:1.0.0
    container_name: skillsync-eureka-server
    ports:
      - "9761:9761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_INSTANCE_PORT: 9761
      EUREKA_CLIENT_REGISTERWITHRURKA: "false"
      EUREKA_CLIENT_FETCHREGISTRY: "false"
      SPRING_APPLICATION_NAME: eureka-server
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
      SERVER_PORT: 9761
    depends_on:
      - mysql
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9761/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # CONFIG SERVER: Centralized configuration management
  config-server:
    image: skillsync-config-server:1.0.0
    container_name: skillsync-config-server
    ports:
      - "9888:9888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      SPRING_APPLICATION_NAME: config-server
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
      SERVER_PORT: 9888
    depends_on:
      - mysql
      - rabbitmq
      - zipkin
      - loki
      - eureka-server
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # AUTH SERVICE: Authentication and Authorization
  auth-service:
    image: skillsync-auth-service:1.0.0
    container_name: skillsync-auth-service
    ports:
      - "9081:9081"
    environment:
      SERVER_PORT: 9081
      SPRING_APPLICATION_NAME: auth-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PORT: 9081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # USER SERVICE: User Management
  user-service:
    image: skillsync-user-service:1.0.0
    container_name: skillsync-user-service
    ports:
      - "9082:9082"
    environment:
      SERVER_PORT: 9082
      SPRING_APPLICATION_NAME: user-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: user-service
      EUREKA_INSTANCE_PORT: 9082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # SKILL SERVICE: Skill Management
  skill-service:
    image: skillsync-skill-service:1.0.0
    container_name: skillsync-skill-service
    ports:
      - "9083:9083"
    environment:
      SERVER_PORT: 9083
      SPRING_APPLICATION_NAME: skill-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: skill-service
      EUREKA_INSTANCE_PORT: 9083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MENTOR SERVICE: Mentor Management
  mentor-service:
    image: skillsync-mentor-service:1.0.0
    container_name: skillsync-mentor-service
    ports:
      - "9084:9084"
    environment:
      SERVER_PORT: 9084
      SPRING_APPLICATION_NAME: mentor-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: mentor-service
      EUREKA_INSTANCE_PORT: 9084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # NOTIFICATION SERVICE: Notification Management
  notification-service:
    image: skillsync-notification-service:1.0.0
    container_name: skillsync-notification-service
    ports:
      - "9085:9085"
    environment:
      SERVER_PORT: 9085
      SPRING_APPLICATION_NAME: notification-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: notification-service
      EUREKA_INSTANCE_PORT: 9085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # SESSION SERVICE: Session Management
  session-service:
    image: skillsync-session-service:1.0.0
    container_name: skillsync-session-service
    ports:
      - "9086:9086"
    environment:
      SERVER_PORT: 9086
      SPRING_APPLICATION_NAME: session-service
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: session-service
      EUREKA_INSTANCE_PORT: 9086
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillsync_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Welcome@123
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # API GATEWAY: API Gateway for all microservices
  api-gateway:
    image: skillsync-api-gateway:1.0.0
    container_name: skillsync-api-gateway
    ports:
      - "9080:9080"
    environment:
      SERVER_PORT: 9080
      SPRING_APPLICATION_NAME: api-gateway
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:9888/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:9761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PORT: 9080
      SPRING_ZIPKIN_BASEURL: http://zipkin:9411
      SPRING_RABBITMQ_HOST: rabbitmq
      LOKI_ENDPOINT: http://loki:3100
      SPRING_LOGLEVEL: info
    depends_on:
      - eureka-server
      - rabbitmq
      - zipkin
      - loki
    networks:
      - monitor-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # DASHBOARD: The visual UI for everything
  grafana:
    image: grafana/grafana:latest
    container_name: skillsync-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - loki
      - prometheus
      - zipkin
    networks:
      - monitor-net
    volumes:
      - grafana-storage:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ACCESS URLS AFTER `docker-compose -f skillsync-parent/docker-compose.yml up -d --build`
# API Gateway / Swagger: http://localhost:9080/swagger-ui.html
# Eureka:                http://localhost:9761
# Config Server:         http://localhost:9888
# RabbitMQ Admin:        http://localhost:15672 (guest / guest)
# Grafana:               http://localhost:3000
# Zipkin:                http://localhost:9411
# Prometheus:            http://localhost:9090
# Service ports:
# - auth-service         9081
# - user-service         9082
# - mentor-service       9083
# - skill-service        9084
# - session-service      9086
# - notification-service 9085
# - frontend             not included in this compose file

volumes:
  loki-storage:
    driver: local
  mysql-data:
    driver: local
  grafana-storage:
    driver: local

networks:
  monitor-net:
    driver: bridge
