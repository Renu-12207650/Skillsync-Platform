# --------------------------------------------------------------
# SkillSync frontend — Nginx config.
# Serves the Vite SPA and reverse-proxies all backend API paths
# to the Spring Cloud Gateway (`api-gateway:9080`) running in the
# same docker-compose network.
# --------------------------------------------------------------

upstream skillsync_gateway {
  # `api-gateway` is the service name in docker-compose.yml.
  server api-gateway:9080;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache static assets (vite emits hashed filenames).
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # API gateway pass-through. Everything below here goes to the
  # backend microservices via the gateway, so the SPA can call
  # /auth, /users, /mentors, etc. on the same origin.
  location ~ ^/(auth|users|mentors|skills|sessions|notifications|support|chatbot)(/|$) {
    proxy_pass         http://skillsync_gateway;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 60s;
  }

  # Optional: forward Swagger aggregator UI under /api-docs
  location /v3/api-docs/ { proxy_pass http://skillsync_gateway; }
  location /swagger-ui/  { proxy_pass http://skillsync_gateway; }
  location = /swagger-ui.html { proxy_pass http://skillsync_gateway; }

  # SPA fallback — any unmatched path returns index.html so client-side
  # routing works on hard reload / direct URL hits.
  location / {
    try_files $uri /index.html;
  }

  # Basic security headers.
  add_header X-Frame-Options          "DENY";
  add_header X-Content-Type-Options   "nosniff";
  add_header Referrer-Policy          "strict-origin-when-cross-origin";
  add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()";
}
